name: Fornax image tests

on:
  pull_request:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forcedphot:
    # Do not run the test matrix on PRs affecting the rendering
    if: >-
      (!(github.event_name == 'pull_request') || !contains(github.event.pull_request.labels.*.name, 'html rendering / skip testing')) &&
      github.repository == 'nasa-fornax/fornax-demo-notebooks'

    name: Testing forced photometry
    runs-on: ubuntu-latest
    container:
      # Revise once https://github.com/actions/checkout/issues/1575 is addressed differently
      image: ghcr.io/nasa-fornax/fornax-images/fornax-main:stable
      options: --user root

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      #- name: Setup ssh session
      #  uses: Warpbuilds/action-debugger@v1.3

      - name: Mark repository as safe
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade tox
          jupyter kernelspec list

      - name: Test with tox
        run: tox -e forcedphot
